kind = "web"
previewPath = "/"
title = "BasisGuard"
version = "1.0.0"
id = "artifacts/basisguard"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18252

[services.development]
run = "pnpm --filter @workspace/basisguard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/basisguard", "run", "build" ]
serve = "static"
publicDir = "artifacts/basisguard/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18252"
BASE_PATH = "/"

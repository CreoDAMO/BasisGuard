openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: BasisGuard Evidence Log & Adaptation Engine API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Dashboard summary and analytics
  - name: positions
    description: Position record operations
  - name: citations
    description: Authority citation operations
  - name: profiles
    description: Treatment profile operations
  - name: export
    description: Evidence export operations
  - name: chains
    description: Chain and protocol registry
  - name: submissions
    description: Self-service chain/protocol onboarding submissions
  - name: intelligence
    description: Tier suggestion engine and stale position detection
  - name: lots
    description: Lot inventory — open positions, cost basis, and holding-period tracking
  - name: notifications
    description: In-app notification inbox and preferences
  - name: exchanges
    description: Kraken and Gemini exchange connection and sync
  - name: metrics
    description: Internal observability metrics (admin only)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Dashboard ───────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent position record activity
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PositionRecord"

  # ── Intelligence ─────────────────────────────────────────────────────────────
  /intelligence/suggest:
    get:
      operationId: getIntelligenceSuggestion
      tags: [intelligence]
      summary: Suggest tier, rationale template, and authority IDs for an event type
      parameters:
        - name: event_type
          in: query
          required: true
          schema:
            type: string
          description: The DeFi event type to classify (e.g. swap, staking_reward, airdrop)
        - name: protocol
          in: query
          schema:
            type: string
          description: Optional protocol slug (e.g. uniswap_v3) for context
        - name: chain
          in: query
          schema:
            type: string
          description: Optional chain slug (e.g. ethereum) for context
      responses:
        "200":
          description: Tier suggestion with rationale template and authority IDs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntelligenceSuggestion"

  /intelligence/stale:
    get:
      operationId: getStalePositions
      tags: [intelligence]
      summary: List all stale positions (reasonable_basis, >180 days, not superseded)
      responses:
        "200":
          description: Stale positions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StalePositionList"

  # ── Positions ────────────────────────────────────────────────────────────────
  /positions:
    get:
      operationId: listPositions
      tags: [positions]
      summary: List position records
      parameters:
        - name: tier
          in: query
          schema:
            type: string
            enum: [will, should, more_likely_than_not, substantial_authority, reasonable_basis]
        - name: requires_review
          in: query
          schema:
            type: boolean
        - name: event_type
          in: query
          schema:
            type: string
        - name: classification
          in: query
          schema:
            type: string
        - name: profile_id
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of positions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PositionList"
    post:
      operationId: createPosition
      tags: [positions]
      summary: Create a new position record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PositionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PositionRecord"

  /positions/review-queue:
    get:
      operationId: getReviewQueue
      tags: [positions]
      summary: Get all positions requiring human review
      responses:
        "200":
          description: Review queue
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PositionRecord"

  /positions/batch-signoff:
    post:
      operationId: batchSignoffPositions
      tags: [positions]
      summary: Batch sign-off on multiple positions in a single CPA attestation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchSignoffInput"
      responses:
        "200":
          description: Batch signoff result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchSignoffResult"

  /positions/tier-suggestion:
    get:
      operationId: getTierSuggestion
      tags: [positions]
      summary: Auto-suggest a confidence tier based on linked citations and event type
      parameters:
        - name: event_type
          in: query
          required: true
          schema:
            type: string
        - name: citation_ids
          in: query
          schema:
            type: array
            items:
              type: string
            default: []
      responses:
        "200":
          description: Tier suggestion with reasoning
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TierSuggestion"

  /positions/harvest-candidates:
    get:
      operationId: getHarvestCandidates
      tags: [positions]
      summary: Aggregate realized taxable-disposition losses and flag wash-sale risk
      description: >
        Returns positions already classified as taxable_disposition — meaning the disposal
        has occurred and the loss is realized — grouped with wash-sale risk flags for any
        matching gain within a 30-day window. This is realized-loss aggregation, not a
        forward-looking analysis of open or unrealized positions. It does not identify
        which currently-held lots are underwater or worth selling before year-end; that
        requires the lot-inventory model (current holdings, basis, unrealized P&L per wallet)
        which is not yet implemented.

        Note: IRC §1091 wash-sale rules apply to stocks and securities; the IRS has not
        officially extended them to cryptocurrency. Flags here are conservative practitioner
        markers, not legal determinations.
      parameters:
        - name: tax_year
          in: query
          schema:
            type: integer
        - name: wallet_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Harvest candidates with optional wash-sale risk flags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HarvestCandidates"

  /positions/{id}:
    get:
      operationId: getPosition
      tags: [positions]
      summary: Get a position record by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Position record with citations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PositionDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updatePosition
      tags: [positions]
      summary: Update a position record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PositionUpdate"
      responses:
        "200":
          description: Updated position
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PositionRecord"

  /positions/{id}/signoff:
    post:
      operationId: signOffPosition
      tags: [positions]
      summary: CPA/reviewer sign-off on a position
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignoffInput"
      responses:
        "200":
          description: Signed off position
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PositionRecord"

  /positions/{id}/supersede:
    post:
      operationId: supersedePosition
      tags: [positions]
      summary: Create a new position that supersedes this one
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PositionInput"
      responses:
        "201":
          description: New superseding position
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PositionRecord"

  /positions/{id}/history:
    get:
      operationId: getPositionHistory
      tags: [positions]
      summary: Get the full supersession chain for a position (oldest first)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full history chain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PositionHistory"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Citations ────────────────────────────────────────────────────────────────
  /citations:
    get:
      operationId: listCitations
      tags: [citations]
      summary: List authority citations
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [Notice, Rev_Proc, Rev_Rul, Treasury_Decision, Case, Statute]
        - name: authority_strength
          in: query
          schema:
            type: string
            enum: [binding_on_courts, binding_on_irs_only, non_binding_persuasive]
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of citations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuthorityCitation"
    post:
      operationId: createCitation
      tags: [citations]
      summary: Add an authority citation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CitationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorityCitation"

  /citations/{id}:
    get:
      operationId: getCitation
      tags: [citations]
      summary: Get a citation by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Citation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorityCitation"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateCitation
      tags: [citations]
      summary: Update a citation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CitationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorityCitation"
    delete:
      operationId: deleteCitation
      tags: [citations]
      summary: Delete a citation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ── Profiles ─────────────────────────────────────────────────────────────────
  /profiles:
    get:
      operationId: listProfiles
      tags: [profiles]
      summary: List treatment profiles
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, deprecated, opt_in_only]
      responses:
        "200":
          description: List of profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TreatmentProfile"
    post:
      operationId: createProfile
      tags: [profiles]
      summary: Create a treatment profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TreatmentProfile"

  /profiles/{id}:
    get:
      operationId: getProfile
      tags: [profiles]
      summary: Get a treatment profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TreatmentProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProfile
      tags: [profiles]
      summary: Update a profile (e.g. deprecate it)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TreatmentProfile"

  /profiles/{id}/delta:
    get:
      operationId: getProfileDelta
      tags: [profiles]
      summary: Get delta report — positions that would change under this profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Delta report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileDelta"

  # ── Export ───────────────────────────────────────────────────────────────────
  /export/audit-package:
    get:
      operationId: getAuditPackage
      tags: [export]
      summary: Generate audit response package for a tax year
      parameters:
        - name: tax_year
          in: query
          required: true
          schema:
            type: integer
        - name: wallet_id
          in: query
          schema:
            type: string
        - name: redact_pii
          in: query
          schema:
            type: boolean
            default: false
          description: When true, wallet_id and tx_id are masked in the output
      responses:
        "200":
          description: Audit package
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditPackage"

  /export/pattern-report:
    get:
      operationId: getPatternReport
      tags: [export]
      summary: Get anonymized aggregate pattern report for open-gap categories
      responses:
        "200":
          description: Pattern report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatternReport"

  /export/comment-letter:
    get:
      operationId: getCommentLetter
      tags: [export]
      summary: Generate anonymized aggregate data suitable for IRS comment letters on open-gap guidance
      responses:
        "200":
          description: Comment letter data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentLetter"

  # ── Chains ───────────────────────────────────────────────────────────────────
  /chains:
    get:
      operationId: listChains
      tags: [chains]
      summary: List all supported chains
      responses:
        "200":
          description: Chain list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Chain"
    post:
      operationId: createChain
      tags: [chains]
      summary: Add a chain directly (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChainInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chain"

  /chains/{id}:
    get:
      operationId: getChain
      tags: [chains]
      summary: Get chain with its protocols
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Chain with protocols
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChainDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /protocols:
    get:
      operationId: listProtocols
      tags: [chains]
      summary: List all protocol adapters
      parameters:
        - name: chain_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Protocol list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Protocol"
    post:
      operationId: createProtocol
      tags: [chains]
      summary: Add a protocol adapter directly (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProtocolInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Protocol"

  /protocols/{id}:
    get:
      operationId: getProtocol
      tags: [chains]
      summary: Get a protocol adapter
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Protocol
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Protocol"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Submissions ───────────────────────────────────────────────────────────────
  /submit/chain:
    post:
      operationId: submitChain
      tags: [submissions]
      summary: CPA/partner submits a chain for review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChainSubmissionInput"
      responses:
        "201":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"

  /submit/protocol:
    post:
      operationId: submitProtocol
      tags: [submissions]
      summary: CPA/partner submits a protocol adapter for review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProtocolSubmissionInput"
      responses:
        "201":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"

  /admin/submissions:
    get:
      operationId: listSubmissions
      tags: [submissions]
      summary: List all submissions (admin)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, all]
            default: pending
      responses:
        "200":
          description: Submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Submission"

  /admin/submissions/chain/{id}/approve:
    patch:
      operationId: approveChainSubmission
      tags: [submissions]
      summary: Approve a chain submission — creates the Chain record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewApprovalInput"
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"

  /admin/submissions/chain/{id}/reject:
    patch:
      operationId: rejectChainSubmission
      tags: [submissions]
      summary: Reject a chain submission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewRejectionInput"
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"

  /admin/submissions/protocol/{id}/approve:
    patch:
      operationId: approveProtocolSubmission
      tags: [submissions]
      summary: Approve a protocol submission — creates the Protocol record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewApprovalInput"
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"

  /admin/submissions/protocol/{id}/reject:
    patch:
      operationId: rejectProtocolSubmission
      tags: [submissions]
      summary: Reject a protocol submission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewRejectionInput"
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"

  /export/cpa-handoff:
    get:
      operationId: getCpaHandoff
      tags: [export]
      summary: Generate CPA hand-off package with summary and open action items
      parameters:
        - name: tax_year
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: CPA hand-off package
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CpaHandoff"

  /export/dossier:
    get:
      operationId: getDossier
      tags: [export]
      summary: One-click IRS-ready dossier combining all four export views for a tax year
      description: >
        Runs audit-package, pattern-report, comment-letter, and cpa-handoff in parallel
        and returns them as a single envelope. Latency is bounded by the slowest query.
      parameters:
        - name: tax_year
          in: query
          required: true
          schema:
            type: integer
        - name: wallet_id
          in: query
          schema:
            type: string
        - name: redact_pii
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: IRS-ready combined dossier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IrsReadyDossier"

  # ── Lot Inventory ─────────────────────────────────────────────────────────

  /lots:
    get:
      operationId: listLots
      tags: [lots]
      summary: List tax lots
      description: >
        Returns tax lots (acquisition records) with computed holding_days and
        holding_period_type. unrealized_gain_loss_usd is always null until a
        price oracle is wired; cost basis and holding period are always available.
      parameters:
        - name: wallet_id
          in: query
          schema:
            type: string
        - name: asset_symbol
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [open, closed, partial]
        - name: chain_id
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated lot list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Lot"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
                required: [items, total, limit, offset]
    post:
      operationId: createLot
      tags: [lots]
      summary: Create a tax lot
      description: >
        Manually record an acquisition. Provide either cost_basis_usd (total)
        or cost_basis_per_unit_usd; the other is derived automatically.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLotRequest"
      responses:
        "201":
          description: Created lot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lot"

  /lots/summary:
    get:
      operationId: getLotSummary
      tags: [lots]
      summary: Aggregate lot inventory by wallet and asset
      description: >
        Returns open-lot counts, total cost basis, short/long-term breakdown,
        and a per-asset breakdown. unrealized_gain_loss_usd is null (price oracle
        not yet implemented). Filter to a single wallet with wallet_id.
      parameters:
        - name: wallet_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Lot inventory summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LotSummary"

  /lots/{id}:
    get:
      operationId: getLot
      tags: [lots]
      summary: Get a tax lot by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tax lot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lot"
        "404":
          description: Not found
    patch:
      operationId: patchLot
      tags: [lots]
      summary: Update a tax lot
      description: Close a lot, record a partial disposal, or add notes.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchLotRequest"
      responses:
        "200":
          description: Updated lot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lot"
        "404":
          description: Not found

  # ── Notifications ────────────────────────────────────────────────────────────

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for the current user
      parameters:
        - name: unread_only
          in: query
          schema: { type: boolean }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 100 }
      responses:
        "200":
          description: Notifications list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/count:
    get:
      operationId: getNotificationCount
      tags: [notifications]
      summary: Get unread notification count (for bell badge)
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  unread: { type: integer }
                required: [unread]

  /notifications/generate:
    post:
      operationId: generateNotifications
      tags: [notifications]
      summary: Refresh auto-generated notifications (stale positions, review queue)
      responses:
        "200":
          description: Notification types that were generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  generated:
                    type: array
                    items: { type: string }
                required: [generated]

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a single notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Updated notification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
        "404":
          description: Not found

  /notifications/preferences:
    get:
      operationId: getNotificationPreferences
      tags: [notifications]
      summary: Get notification preferences for the current user
      responses:
        "200":
          description: Preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPreferences"
    put:
      operationId: updateNotificationPreferences
      tags: [notifications]
      summary: Update notification preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationPreferences"
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPreferences"

  # ── Exchanges (Kraken + Gemini) ───────────────────────────────────────────────

  /kraken/connection:
    get:
      operationId: getKrakenConnection
      tags: [exchanges]
      summary: Get Kraken connection status
      responses:
        "200":
          description: Connection status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeConnection"
    post:
      operationId: saveKrakenConnection
      tags: [exchanges]
      summary: Save or replace Kraken API credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExchangeCredentials"
      responses:
        "200":
          description: Connection confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeConnection"
    delete:
      operationId: deleteKrakenConnection
      tags: [exchanges]
      summary: Remove Kraken connection
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                type: object
                properties:
                  disconnected: { type: boolean }
                  exchange: { type: string }

  /kraken/sync:
    post:
      operationId: syncKraken
      tags: [exchanges]
      summary: Pull Kraken ledger entries into raw_transactions
      responses:
        "200":
          description: Sync summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"
        "400":
          description: No connection configured
        "502":
          description: Exchange API error

  /gemini/connection:
    get:
      operationId: getGeminiConnection
      tags: [exchanges]
      summary: Get Gemini connection status
      responses:
        "200":
          description: Connection status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeConnection"
    post:
      operationId: saveGeminiConnection
      tags: [exchanges]
      summary: Save or replace Gemini API credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExchangeCredentials"
      responses:
        "200":
          description: Connection confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeConnection"
    delete:
      operationId: deleteGeminiConnection
      tags: [exchanges]
      summary: Remove Gemini connection
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                type: object
                properties:
                  disconnected: { type: boolean }
                  exchange: { type: string }

  /gemini/sync:
    post:
      operationId: syncGemini
      tags: [exchanges]
      summary: Pull Gemini trades and transfers into raw_transactions
      responses:
        "200":
          description: Sync summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"
        "400":
          description: No connection configured
        "502":
          description: Exchange API error

  # ── Metrics ──────────────────────────────────────────────────────────────────

  /metrics:
    get:
      operationId: getMetrics
      tags: [metrics]
      summary: Internal process metrics (admin only)
      responses:
        "200":
          description: Metrics snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsSnapshot"
        "403":
          description: Forbidden — admin role required

# ── Schemas ──────────────────────────────────────────────────────────────────
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    # ── Authority Citation ─────────────────────────────────────────────────────
    AuthorityCitation:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [Notice, Rev_Proc, Rev_Rul, Treasury_Decision, Case, Statute]
        reference:
          type: string
        summary:
          type: string
        url:
          type: ["string", "null"]
        authority_strength:
          type: string
          enum: [binding_on_courts, binding_on_irs_only, non_binding_persuasive]
        created_at:
          type: string
      required:
        - id
        - type
        - reference
        - summary
        - authority_strength
        - created_at

    CitationInput:
      type: object
      properties:
        type:
          type: string
          enum: [Notice, Rev_Proc, Rev_Rul, Treasury_Decision, Case, Statute]
        reference:
          type: string
        summary:
          type: string
        url:
          type: string
        authority_strength:
          type: string
          enum: [binding_on_courts, binding_on_irs_only, non_binding_persuasive]
      required:
        - type
        - reference
        - summary
        - authority_strength

    CitationUpdate:
      type: object
      properties:
        type:
          type: string
          enum: [Notice, Rev_Proc, Rev_Rul, Treasury_Decision, Case, Statute]
        reference:
          type: string
        summary:
          type: string
        url:
          type: string
        authority_strength:
          type: string
          enum: [binding_on_courts, binding_on_irs_only, non_binding_persuasive]

    # ── Treatment Profile ──────────────────────────────────────────────────────
    ProfileRule:
      type: object
      properties:
        event_type:
          type: string
        classification:
          type: string
        tier:
          type: string
          enum: [will, should, more_likely_than_not, substantial_authority, reasonable_basis]
        citation_ids:
          type: array
          items:
            type: string
      required:
        - event_type
        - classification
        - tier
        - citation_ids

    TreatmentProfile:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [active, deprecated, opt_in_only]
        rules:
          type: array
          items:
            $ref: "#/components/schemas/ProfileRule"
        changelog:
          type: ["string", "null"]
        created_at:
          type: string
      required:
        - id
        - name
        - status
        - rules
        - created_at

    ProfileInput:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [active, deprecated, opt_in_only]
        rules:
          type: array
          items:
            $ref: "#/components/schemas/ProfileRule"
        changelog:
          type: string
      required:
        - name
        - status
        - rules

    ProfileUpdate:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [active, deprecated, opt_in_only]
        rules:
          type: array
          items:
            $ref: "#/components/schemas/ProfileRule"
        changelog:
          type: string

    ProfileDelta:
      type: object
      properties:
        profile_id:
          type: string
        profile_name:
          type: string
        changed_positions:
          type: array
          items:
            $ref: "#/components/schemas/DeltaEntry"
        total_changed:
          type: integer
      required:
        - profile_id
        - profile_name
        - changed_positions
        - total_changed

    DeltaEntry:
      type: object
      properties:
        position_id:
          type: string
        tx_id:
          type: string
        event_type:
          type: string
        before_classification:
          type: string
        after_classification:
          type: string
        before_tier:
          type: string
        after_tier:
          type: string
      required:
        - position_id
        - tx_id
        - event_type
        - before_classification
        - after_classification
        - before_tier
        - after_tier

    # ── Position Record ────────────────────────────────────────────────────────
    PositionRecord:
      type: object
      properties:
        id:
          type: string
        tx_id:
          type: ["string", "null"]
        tx_date:
          type: ["string", "null"]
          format: date-time
          description: Actual date of the underlying transaction (used for tax-year bucketing). Falls back to created_at when absent.
        wallet_id:
          type: ["string", "null"]
        event_type:
          type: string
        classification:
          type: string
        tier:
          type: string
          enum: [will, should, more_likely_than_not, substantial_authority, reasonable_basis]
        rationale:
          type: string
        profile_id:
          type: ["string", "null"]
        profile_version:
          type: ["string", "null"]
        requires_review:
          type: boolean
        reviewer_id:
          type: ["string", "null"]
        reviewer_name:
          type: ["string", "null"]
        reviewer_credential:
          type: ["string", "null"]
        reviewer_signoff_at:
          type: ["string", "null"]
        chain_id:
          type: ["string", "null"]
          description: Chain this position is associated with, if known
        superseded_by:
          type: ["string", "null"]
        created_at:
          type: string
        is_stale:
          type: boolean
          description: True when a Reasonable Basis position is older than 180 days and has not been superseded
      required:
        - id
        - event_type
        - classification
        - tier
        - rationale
        - requires_review
        - created_at
        - is_stale

    PositionDetail:
      allOf:
        - $ref: "#/components/schemas/PositionRecord"
        - type: object
          properties:
            citations:
              type: array
              items:
                $ref: "#/components/schemas/AuthorityCitation"
            profile:
              $ref: "#/components/schemas/TreatmentProfile"
          required:
            - citations

    PositionList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PositionRecord"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required:
        - items
        - total
        - limit
        - offset

    PositionInput:
      type: object
      properties:
        tx_id:
          type: string
        tx_date:
          type: string
          format: date-time
          description: Actual date of the underlying transaction. Used for tax-year audit packages. If omitted, created_at is used as the fallback.
        wallet_id:
          type: string
        event_type:
          type: string
        classification:
          type: string
        tier:
          type: string
          enum: [will, should, more_likely_than_not, substantial_authority, reasonable_basis]
        rationale:
          type: string
        profile_id:
          type: string
        profile_version:
          type: string
        citation_ids:
          type: array
          items:
            type: string
        requires_review:
          type: boolean
      required:
        - event_type
        - classification
        - tier
        - rationale

    PositionUpdate:
      type: object
      properties:
        rationale:
          type: string
        requires_review:
          type: boolean
        citation_ids:
          type: array
          items:
            type: string

    SignoffInput:
      type: object
      properties:
        reviewer_id:
          type: string
        reviewer_name:
          type: string
        reviewer_credential:
          type: string
      required:
        - reviewer_id
        - reviewer_name
        - reviewer_credential

    # ── Dashboard ──────────────────────────────────────────────────────────────
    TierBreakdown:
      type: object
      properties:
        tier:
          type: string
        count:
          type: integer
        label:
          type: string
      required:
        - tier
        - count
        - label

    DashboardSummary:
      type: object
      properties:
        total_positions:
          type: integer
        pending_review:
          type: integer
        signed_off:
          type: integer
        auto_applied:
          type: integer
        tier_breakdown:
          type: array
          items:
            $ref: "#/components/schemas/TierBreakdown"
        active_profiles:
          type: integer
        total_citations:
          type: integer
        open_gap_events:
          type: integer
        stale_count:
          type: integer
      required:
        - total_positions
        - pending_review
        - signed_off
        - auto_applied
        - tier_breakdown
        - active_profiles
        - total_citations
        - open_gap_events
        - stale_count

    # ── Intelligence ─────────────────────────────────────────────────────────
    IntelligenceSuggestion:
      type: object
      properties:
        event_type:
          type: string
        suggested_tier:
          type: string
          enum: [will, should, more_likely_than_not, substantial_authority, reasonable_basis]
        confidence_basis:
          type: string
        rationale_template:
          type: string
        suggested_authority_ids:
          type: array
          items:
            type: string
        citations_seeded:
          type: integer
      required:
        - event_type
        - suggested_tier
        - confidence_basis
        - rationale_template
        - suggested_authority_ids
        - citations_seeded

    StalePositionItem:
      type: object
      properties:
        id:
          type: string
        tx_id:
          type: ["string", "null"]
        wallet_id:
          type: ["string", "null"]
        event_type:
          type: string
        classification:
          type: string
        tier:
          type: string
        rationale:
          type: string
        profile_id:
          type: ["string", "null"]
        requires_review:
          type: boolean
        reviewer_signoff_at:
          type: ["string", "null"]
        created_at:
          type: string
        days_since_classification:
          type: integer
        is_stale:
          type: boolean
      required:
        - id
        - event_type
        - classification
        - tier
        - rationale
        - requires_review
        - created_at
        - days_since_classification
        - is_stale

    StalePositionList:
      type: object
      properties:
        stale_count:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/StalePositionItem"
      required:
        - stale_count
        - items

    # ── Batch Signoff ──────────────────────────────────────────────────────────
    BatchSignoffInput:
      type: object
      properties:
        position_ids:
          type: array
          items:
            type: string
          minItems: 1
        reviewer_id:
          type: string
        reviewer_name:
          type: string
        reviewer_credential:
          type: string
        note:
          type: ["string", "null"]
          description: Optional attestation note applied to all positions in the batch
      required:
        - position_ids
        - reviewer_id
        - reviewer_name
        - reviewer_credential

    BatchSignoffResult:
      type: object
      properties:
        signed_count:
          type: integer
        skipped_count:
          type: integer
          description: Positions skipped because they were already signed off
        signed_ids:
          type: array
          items:
            type: string
        skipped_ids:
          type: array
          items:
            type: string
      required:
        - signed_count
        - skipped_count
        - signed_ids
        - skipped_ids

    # ── Tier Suggestion ────────────────────────────────────────────────────────
    TierSuggestion:
      type: object
      properties:
        suggested_tier:
          type: string
          enum: [will, should, more_likely_than_not, substantial_authority, reasonable_basis]
        ceiling_tier:
          type: string
          enum: [will, should, more_likely_than_not, substantial_authority, reasonable_basis]
          description: Maximum defensible tier given the provided citations
        reasoning:
          type: string
        citation_count:
          type: integer
        strongest_authority:
          type: ["string", "null"]
        profile_rule_match:
          type: ["string", "null"]
          description: Tier from matching profile rule, if any
        flag_downgrade:
          type: boolean
          description: True when suggested tier is lower than ceiling_tier — user should be cautioned
      required:
        - suggested_tier
        - ceiling_tier
        - reasoning
        - citation_count
        - flag_downgrade

    # ── Position History ───────────────────────────────────────────────────────
    PositionHistoryEntry:
      allOf:
        - $ref: "#/components/schemas/PositionRecord"
        - type: object
          properties:
            is_current:
              type: boolean
            generation:
              type: integer
              description: 1 = original, 2 = first supersession, etc.
          required:
            - is_current
            - generation

    PositionHistory:
      type: object
      properties:
        chain_length:
          type: integer
        current_id:
          type: string
        entries:
          type: array
          items:
            $ref: "#/components/schemas/PositionHistoryEntry"
      required:
        - chain_length
        - current_id
        - entries

    # ── Export ─────────────────────────────────────────────────────────────────
    AuditPackage:
      type: object
      properties:
        tax_year:
          type: integer
        wallet_id:
          type: ["string", "null"]
        generated_at:
          type: string
        positions:
          type: array
          items:
            $ref: "#/components/schemas/PositionDetail"
        total_positions:
          type: integer
        requires_review_count:
          type: integer
      required:
        - tax_year
        - generated_at
        - positions
        - total_positions
        - requires_review_count

    CommentLetterEntry:
      type: object
      properties:
        event_type:
          type: string
        position_count:
          type: integer
        tier_distribution:
          type: object
          additionalProperties:
            type: integer
        guidance_gap:
          type: boolean
        pending_irs_notices:
          type: array
          items:
            type: string
        practitioner_summary:
          type: string
          description: Plain-English summary of the open guidance issue
      required:
        - event_type
        - position_count
        - tier_distribution
        - guidance_gap
        - pending_irs_notices
        - practitioner_summary

    CommentLetter:
      type: object
      properties:
        generated_at:
          type: string
        total_open_gap_positions:
          type: integer
        entries:
          type: array
          items:
            $ref: "#/components/schemas/CommentLetterEntry"
        disclaimer:
          type: string
      required:
        - generated_at
        - total_open_gap_positions
        - entries
        - disclaimer

    CpaHandoffSummary:
      type: object
      properties:
        tax_year:
          type: integer
        total_positions:
          type: integer
        signed_off:
          type: integer
        pending_signoff:
          type: integer
        stale_reasonable_basis:
          type: integer
        tier_breakdown:
          type: object
          additionalProperties:
            type: integer
        open_action_items:
          type: array
          items:
            type: string
      required:
        - tax_year
        - total_positions
        - signed_off
        - pending_signoff
        - stale_reasonable_basis
        - tier_breakdown
        - open_action_items

    CpaHandoff:
      type: object
      properties:
        generated_at:
          type: string
        summary:
          $ref: "#/components/schemas/CpaHandoffSummary"
        positions:
          type: array
          items:
            $ref: "#/components/schemas/PositionDetail"
        preparer_checklist:
          type: array
          items:
            type: string
      required:
        - generated_at
        - summary
        - positions
        - preparer_checklist

    PatternReportEntry:
      type: object
      properties:
        event_type:
          type: string
        count:
          type: integer
        tier_distribution:
          type: object
          additionalProperties:
            type: integer
        open_gap:
          type: boolean
      required:
        - event_type
        - count
        - tier_distribution
        - open_gap

    PatternReport:
      type: object
      properties:
        generated_at:
          type: string
        total_positions:
          type: integer
        entries:
          type: array
          items:
            $ref: "#/components/schemas/PatternReportEntry"
      required:
        - generated_at
        - total_positions
        - entries

    # ── Chain & Protocol ───────────────────────────────────────────────────────
    Chain:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        is_l2:
          type: boolean
        parent_chain_id:
          type: ["string", "null"]
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
      required:
        - id
        - name
        - slug
        - is_l2
        - created_at

    ChainInput:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        is_l2:
          type: boolean
        parent_chain_id:
          type: string
        metadata:
          type: object
          additionalProperties: true
      required:
        - name
        - slug

    Protocol:
      type: object
      properties:
        id:
          type: string
        chain_id:
          type: string
        name:
          type: string
        slug:
          type: string
        contract_addresses:
          type: object
          additionalProperties: true
        adapter_version:
          type: ["string", "null"]
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
      required:
        - id
        - chain_id
        - name
        - slug
        - created_at

    ProtocolInput:
      type: object
      properties:
        chain_id:
          type: string
        name:
          type: string
        slug:
          type: string
        contract_addresses:
          type: object
          additionalProperties: true
        adapter_version:
          type: string
        metadata:
          type: object
          additionalProperties: true
      required:
        - chain_id
        - name
        - slug

    ChainDetail:
      allOf:
        - $ref: "#/components/schemas/Chain"
        - type: object
          properties:
            protocols:
              type: array
              items:
                $ref: "#/components/schemas/Protocol"
          required:
            - protocols

    # ── Submissions ────────────────────────────────────────────────────────────
    Submission:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [chain, protocol]
        submitted_by:
          type: string
        submitter_credential:
          type: string
        name:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        reviewed_by:
          type: ["string", "null"]
        reviewed_at:
          type: ["string", "null"]
        rejection_reason:
          type: ["string", "null"]
        created_at:
          type: string
      required:
        - id
        - type
        - submitted_by
        - submitter_credential
        - name
        - slug
        - status
        - created_at

    ChainSubmissionInput:
      type: object
      properties:
        submitted_by:
          type: string
        submitter_credential:
          type: string
        name:
          type: string
        slug:
          type: string
        is_l2:
          type: boolean
        parent_chain_slug:
          type: string
        rpc_url:
          type: string
        explorer_url:
          type: string
        native_token:
          type: string
      required:
        - submitted_by
        - submitter_credential
        - name
        - slug

    ReviewApprovalInput:
      type: object
      properties:
        reviewed_by:
          type: string

    ReviewRejectionInput:
      type: object
      properties:
        reviewed_by:
          type: string
        rejection_reason:
          type: string

    ProtocolSubmissionInput:
      type: object
      properties:
        submitted_by:
          type: string
        submitter_credential:
          type: string
        chain_slug:
          type: string
        name:
          type: string
        slug:
          type: string
        contract_addresses:
          type: object
          additionalProperties: true
        adapter_version:
          type: string
        documentation_url:
          type: string
        notes:
          type: string
      required:
        - submitted_by
        - submitter_credential
        - chain_slug
        - name
        - slug

    # ── IRS-Ready Dossier ──────────────────────────────────────────────────────

    IrsReadyDossier:
      type: object
      properties:
        generated_at:
          type: string
        dossier_version:
          type: string
        tax_year:
          type: integer
        wallet_id:
          type: string
          nullable: true
        disclaimer:
          type: string
        audit_package:
          $ref: "#/components/schemas/AuditPackage"
        pattern_report:
          $ref: "#/components/schemas/PatternReport"
        comment_letter:
          $ref: "#/components/schemas/CommentLetter"
        cpa_handoff:
          $ref: "#/components/schemas/CpaHandoff"
      required:
        - generated_at
        - dossier_version
        - tax_year
        - disclaimer
        - audit_package
        - pattern_report
        - comment_letter
        - cpa_handoff

    # ── Harvest Candidates ─────────────────────────────────────────────────────

    WashSalePair:
      type: object
      properties:
        loss_position_id:
          type: string
        gain_position_id:
          type: string
        days_between:
          type: integer
      required:
        - loss_position_id
        - gain_position_id
        - days_between

    HarvestCandidate:
      type: object
      properties:
        position_id:
          type: string
        wallet_id:
          type: string
          nullable: true
        event_type:
          type: string
        classification:
          type: string
        tier:
          type: string
        tx_date:
          type: string
          nullable: true
        amount_usd:
          type: number
          nullable: true
          description: Realized gain (positive) or loss (negative) in USD; null if unknown
        requires_review:
          type: boolean
        reviewer_signoff_at:
          type: string
          nullable: true
        wash_sale_risk:
          type: boolean
        wash_sale_pairs:
          type: array
          items:
            $ref: "#/components/schemas/WashSalePair"
      required:
        - position_id
        - event_type
        - classification
        - tier
        - requires_review
        - wash_sale_risk
        - wash_sale_pairs

    HarvestCandidates:
      type: object
      properties:
        generated_at:
          type: string
        tax_year:
          type: integer
          nullable: true
        wallet_id:
          type: string
          nullable: true
        total_candidates:
          type: integer
        wash_sale_risk_count:
          type: integer
        disclaimer:
          type: string
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/HarvestCandidate"
      required:
        - generated_at
        - total_candidates
        - wash_sale_risk_count
        - disclaimer
        - candidates

    # ── Lot Inventory ──────────────────────────────────────────────────────────

    Lot:
      type: object
      properties:
        id:
          type: string
        position_record_id:
          type: string
          nullable: true
        wallet_id:
          type: string
        asset_symbol:
          type: string
        asset_identifier:
          type: string
          nullable: true
        chain_id:
          type: string
          nullable: true
        quantity:
          type: number
        cost_basis_usd:
          type: number
          nullable: true
        cost_basis_per_unit_usd:
          type: number
          nullable: true
        acquisition_date:
          type: string
        acquisition_tx_id:
          type: string
          nullable: true
        disposal_position_id:
          type: string
          nullable: true
        disposal_date:
          type: string
          nullable: true
        disposal_proceeds_usd:
          type: number
          nullable: true
        realized_gain_loss_usd:
          type: number
          nullable: true
        status:
          type: string
          enum: [open, closed, partial]
        notes:
          type: string
          nullable: true
        created_at:
          type: string
        holding_days:
          type: integer
          description: Days since acquisition (to today for open lots, to disposal date for closed)
        holding_period_type:
          type: string
          enum: [short_term, long_term]
          description: short_term ≤ 365 days, long_term > 365 days
        current_price_usd:
          type: number
          nullable: true
          description: Current spot price in USD from the price oracle (open/partial lots only)
        unrealized_gain_loss_usd:
          type: number
          nullable: true
          description: "(current price − cost basis per unit) × quantity for open/partial lots; null when cost basis or price is unavailable"
      required:
        - id
        - wallet_id
        - asset_symbol
        - quantity
        - acquisition_date
        - status
        - created_at
        - holding_days
        - holding_period_type

    LotSummaryByAsset:
      type: object
      properties:
        asset_symbol:
          type: string
        open_lot_count:
          type: integer
        total_quantity:
          type: number
        total_cost_basis_usd:
          type: number
          nullable: true
        current_value_usd:
          type: number
          nullable: true
          description: Current market value of open lots (price × quantity); null when price unavailable
        unrealized_gain_loss_usd:
          type: number
          nullable: true
          description: current_value_usd − total_cost_basis_usd; null when either is unavailable
        short_term_lots:
          type: integer
        long_term_lots:
          type: integer
      required:
        - asset_symbol
        - open_lot_count
        - total_quantity
        - short_term_lots
        - long_term_lots

    LotSummary:
      type: object
      properties:
        generated_at:
          type: string
        wallet_id:
          type: string
          nullable: true
        open_lot_count:
          type: integer
        closed_lot_count:
          type: integer
        total_lot_count:
          type: integer
        total_cost_basis_usd:
          type: number
          nullable: true
        short_term_lots:
          type: integer
        long_term_lots:
          type: integer
        unrealized_gain_loss_usd:
          type: number
          nullable: true
          description: Total unrealized gain/loss across all open lots in USD (null when price unavailable)
        by_asset:
          type: array
          items:
            $ref: "#/components/schemas/LotSummaryByAsset"
      required:
        - generated_at
        - open_lot_count
        - closed_lot_count
        - total_lot_count
        - short_term_lots
        - long_term_lots
        - by_asset

    CreateLotRequest:
      type: object
      properties:
        wallet_id:
          type: string
        asset_symbol:
          type: string
        asset_identifier:
          type: string
        chain_id:
          type: string
        quantity:
          type: number
        cost_basis_usd:
          type: number
        cost_basis_per_unit_usd:
          type: number
        acquisition_date:
          type: string
          format: date-time
        acquisition_tx_id:
          type: string
        position_record_id:
          type: string
        notes:
          type: string
      required:
        - wallet_id
        - asset_symbol
        - quantity
        - acquisition_date

    PatchLotRequest:
      type: object
      properties:
        status:
          type: string
          enum: [open, closed, partial]
        quantity:
          type: number
        cost_basis_usd:
          type: number
          nullable: true
        disposal_position_id:
          type: string
          nullable: true
        disposal_date:
          type: string
          format: date-time
          nullable: true
        disposal_proceeds_usd:
          type: number
          nullable: true
        realized_gain_loss_usd:
          type: number
          nullable: true
        notes:
          type: string
          nullable: true

    # ── Notifications ─────────────────────────────────────────────────────────

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [stale_positions, review_queue, sync_error, general]
        title:
          type: string
        body:
          type: string
        position_id:
          type: string
          format: uuid
          nullable: true
        read:
          type: boolean
        created_at:
          type: string
          format: date-time
      required: [id, type, title, body, read, created_at]

    NotificationPreferences:
      type: object
      properties:
        stale_alerts:
          type: boolean
        review_queue_alerts:
          type: boolean
        sync_error_alerts:
          type: boolean

    # ── Exchanges ─────────────────────────────────────────────────────────────

    ExchangeConnection:
      type: object
      properties:
        connected:
          type: boolean
        exchange:
          type: string
          nullable: true
        api_key:
          type: string
          nullable: true
        last_synced_at:
          type: string
          format: date-time
          nullable: true
        tx_count:
          type: integer
          nullable: true
        status:
          type: string
          nullable: true
        error_message:
          type: string
          nullable: true
      required: [connected]

    ExchangeCredentials:
      type: object
      properties:
        api_key:
          type: string
        api_secret:
          type: string
      required: [api_key, api_secret]

    SyncResult:
      type: object
      properties:
        exchange:
          type: string
        synced:
          type: integer
        skipped:
          type: integer
        errors:
          type: array
          items:
            type: string
      required: [synced, skipped, errors]

    # ── Metrics ───────────────────────────────────────────────────────────────

    MetricsSnapshot:
      type: object
      properties:
        uptime_seconds:
          type: integer
        counters:
          type: object
          additionalProperties:
            type: integer
        timings:
          type: object
          additionalProperties:
            type: object
            properties:
              count: { type: integer }
              total_ms: { type: integer }
              avg_ms: { type: integer }
              max_ms: { type: integer }
        generated_at:
          type: string
          format: date-time
      required: [uptime_seconds, counters, timings, generated_at]
